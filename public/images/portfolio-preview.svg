<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="url(#bgGrad)" />
  
  <!-- 头部导航栏 -->
  <rect x="0" y="0" width="1280" height="80" fill="white" rx="0" />
  <rect x="0" y="80" width="1280" height="2" fill="#e5e7eb" />
  
  <!-- Logo -->
  <text x="100" y="55" font-family="Arial" font-size="24" font-weight="bold" fill="#6366f1">作品集</text>
  
  <!-- 导航链接 -->
  <text x="600" y="55" font-family="Arial" font-size="16" fill="#374151">首页</text>
  <text x="680" y="55" font-family="Arial" font-size="16" fill="#6b7280">关于</text>
  <text x="760" y="55" font-family="Arial" font-size="16" fill="#6b7280">项目</text>
  <text x="840" y="55" font-family="Arial" font-size="16" fill="#6b7280">联系</text>
  
  <!-- Hero 区域 -->
  <circle cx="1000" cy="200" r="200" fill="url(#cardGrad)" opacity="0.1" />
  <circle cx="200" cy="400" r="150" fill="url(#cardGrad)" opacity="0.05" />
  
  <!-- 标题 -->
  <text x="100" y="200" font-family="Arial" font-size="48" font-weight="bold" fill="#111827">
    前端开发
  </text>
  <text x="100" y="260" font-family="Arial" font-size="48" font-weight="bold" fill="#111827">
    工程师
  </text>
  
  <!-- 副标题 -->
  <text x="100" y="310" font-family="Arial" font-size="18" fill="#6b7280" width="400">
    专注于创造优秀的用户体验和高质量的代码
  </text>
  
  <!-- 按钮 -->
  <rect x="100" y="360" width="140" height="50" fill="url(#cardGrad)" rx="8" />
  <text x="145" y="392" font-family="Arial" font-size="16" font-weight="bold" fill="white">
    查看项目
  </text>
  
  <!-- 项目卡片区域 -->
  <text x="100" y="500" font-family="Arial" font-size="32" font-weight="bold" fill="#111827">
    我的项目
  </text>
  
  <!-- 三个项目卡片 -->
  <rect x="100" y="550" width="300" height="200" fill="white" rx="12" stroke="#e5e7eb" stroke-width="1" />
  <rect x="100" y="550" width="300" height="120" fill="#f3f4f6" rx="12" />
  <text x="120" y="670" font-family="Arial" font-size="16" font-weight="bold" fill="#1f2937">项目名称</text>
  <text x="120" y="700" font-family="Arial" font-size="14" fill="#6b7280">项目描述...</text>
  
  <rect x="450" y="550" width="300" height="200" fill="white" rx="12" stroke="#e5e7eb" stroke-width="1" />
  <rect x="450" y="550" width="300" height="120" fill="#e0e7ff" rx="12" />
  <text x="470" y="670" font-family="Arial" font-size="16" font-weight="bold" fill="#1f2937">项目名称</text>
  <text x="470" y="700" font-family="Arial" font-size="14" fill="#6b7280">项目描述...</text>
  
  <rect x="800" y="550" width="300" height="200" fill="white" rx="12" stroke="#e5e7eb" stroke-width="1" />
  <rect x="800" y="550" width="300" height="120" fill="#dcfce7" rx="12" />
  <text x="820" y="670" font-family="Arial" font-size="16" font-weight="bold" fill="#1f2937">项目名称</text>
  <text x="820" y="700" font-family="Arial" font-size="14" fill="#6b7280">项目描述...</text>
  
  <!-- 装饰元素 -->
  <circle cx="900" cy="150" r="4" fill="#6366f1" />
  <circle cx="850" cy="200" r="3" fill="#8b5cf6" />
  <circle cx="950" cy="250" r="5" fill="#a78bfa" />
  
</svg>